<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoMesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --surface:   #161b27;
  --card:      #1c2333;
  --border:    #2a3347;
  --border2:   #364057;
  --accent:    #3b82f6;
  --accent-dim:#1e3a5f;
  --green:     #22c55e;
  --green-dim: #14532d;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --purple:    #a78bfa;
  --purple-dim:#3b1f6e;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #475569;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Inter', sans-serif;
  --radius:    10px;
}

body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── top bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1rem; height: 52px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.logo { font-family: var(--mono); font-size: 1rem; font-weight: 500; color: var(--accent); letter-spacing: 0.04em; }
.logo em { color: var(--text3); font-style: normal; }

.auth-area { display: flex; gap: 8px; align-items: center; }
.auth-area input {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--sans); font-size: 0.8rem;
  padding: 5px 10px; outline: none; width: 110px;
}
.auth-area input:focus { border-color: var(--accent); }
.btn { padding: 5px 14px; border-radius: 6px; border: none; font-family: var(--sans); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-blue { background: var(--accent); color: #fff; }
.btn-blue:hover { background: #2563eb; }
.btn-ghost { background: var(--card); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.user-badge { font-family: var(--mono); font-size: 0.72rem; padding: 4px 10px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); display: none; }

/* ── shell ── */
.shell { flex: 1; display: flex; overflow: hidden; }

/* ── left sidebar: user list ── */
.sidebar {
  width: 220px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0;
}
.sidebar-header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.sidebar-header h3 { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
.user-list { flex: 1; overflow-y: auto; padding: 8px; }
.user-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px; cursor: pointer;
  transition: background 0.1s; border: 1px solid transparent;
}
.user-item:hover { background: var(--card); }
.user-item.active { background: var(--accent-dim); border-color: rgba(59,130,246,0.3); }
.user-item.active .uname { color: var(--accent); }
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 0.75rem; flex-shrink: 0;
}
.uname { font-size: 0.82rem; font-weight: 500; }
.ustatus { font-size: 0.65rem; color: var(--text3); }

.sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }
.new-user-btn { width: 100%; padding: 7px; border: 1px dashed var(--border2); border-radius: 8px; background: none; color: var(--text3); font-size: 0.78rem; cursor: pointer; transition: all 0.15s; }
.new-user-btn:hover { color: var(--text); border-color: var(--accent); }

/* ── chat area ── */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.chat-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); flex-shrink: 0;
}
.chat-title { font-size: 0.9rem; font-weight: 600; }
.chat-subtitle { font-size: 0.7rem; color: var(--text3); margin-top: 2px; font-family: var(--mono); }

.btn-inspector { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--purple); background: var(--purple-dim); color: var(--purple); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-inspector:hover { background: rgba(167,139,250,0.2); }
.btn-inspector .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }

/* ── message bubbles ── */
.msg-row { display: flex; gap: 8px; max-width: 75%; }
.msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.received { align-self: flex-start; }

.bubble-avatar { width: 28px; height: 28px; border-radius: 50%; font-size: 0.65rem; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: flex-end; }

.bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
.msg-row.sent .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 9px 13px; border-radius: 16px; font-size: 0.875rem; line-height: 1.5;
  position: relative; cursor: pointer;
  transition: opacity 0.15s;
}
.bubble:hover { opacity: 0.9; }
.msg-row.sent .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg-row.received .bubble { background: var(--card); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.bubble-meta { display: flex; align-items: center; gap: 6px; }
.bubble-time { font-size: 0.62rem; color: var(--text3); }
.sig-ok  { font-size: 0.6rem; color: var(--green); font-family: var(--mono); }
.sig-bad { font-size: 0.6rem; color: var(--red); font-family: var(--mono); }
.crypto-hint { font-size: 0.6rem; color: var(--text3); font-family: var(--mono); }

/* ── compose ── */
.compose {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end; background: var(--surface); flex-shrink: 0;
}
.compose textarea {
  flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--sans); font-size: 0.875rem;
  padding: 9px 12px; outline: none; resize: none; min-height: 40px; max-height: 120px;
  line-height: 1.5;
}
.compose textarea:focus { border-color: var(--accent); }
.compose textarea::placeholder { color: var(--text3); }
.btn-send { width: 38px; height: 38px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
.btn-send:hover { background: #2563eb; }
.btn-send:disabled { background: var(--border); cursor: not-allowed; }

.empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text3); }
.empty-chat .icon { font-size: 2.5rem; }
.empty-chat p { font-size: 0.875rem; }

/* ── inspector panel ── */
.inspector {
  width: 340px; border-left: 1px solid var(--border);
  background: var(--surface); display: flex; flex-direction: column;
  overflow: hidden; transition: width 0.2s ease;
}
.inspector.hidden { width: 0; overflow: hidden; border: none; }

.inspector-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.inspector-header h3 { font-size: 0.78rem; font-weight: 600; color: var(--purple); letter-spacing: 0.06em; text-transform: uppercase; }
.btn-close-inspector { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1rem; padding: 2px 4px; border-radius: 4px; }
.btn-close-inspector:hover { color: var(--text); background: var(--card); }

.inspector-body { flex: 1; overflow-y: auto; padding: 12px; }

.insp-placeholder { color: var(--text3); font-size: 0.8rem; text-align: center; margin-top: 2rem; line-height: 1.6; }

.insp-section { margin-bottom: 14px; }
.insp-label { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }

.step-item { padding: 8px 10px; background: var(--card); border-radius: 7px; margin-bottom: 6px; border-left: 3px solid var(--border2); animation: fadeUp 0.25s ease forwards; opacity: 0; }
.step-item.dh   { border-left-color: var(--green); }
.step-item.kdf  { border-left-color: var(--accent); }
.step-item.enc  { border-left-color: var(--purple); }
.step-item.sig  { border-left-color: var(--amber); }
.step-item.auth { border-left-color: var(--red); }
.step-item.save { border-left-color: var(--text3); }

@keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }

.step-name { font-size: 0.78rem; font-weight: 500; margin-bottom: 4px; }
.step-detail { font-family: var(--mono); font-size: 0.65rem; color: var(--text2); word-break: break-all; line-height: 1.55; }

.tag { display: inline-block; font-family: var(--mono); font-size: 0.58rem; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
.tag-dh  { background: rgba(34,197,94,0.12); color: var(--green); }
.tag-enc { background: rgba(167,139,250,0.12); color: var(--purple); }
.tag-sig { background: rgba(245,158,11,0.12); color: var(--amber); }
.tag-kdf { background: rgba(59,130,246,0.12); color: var(--accent); }

.algo-badge { font-family: var(--mono); font-size: 0.65rem; padding: 5px 9px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); word-break: break-all; line-height: 1.6; }

/* ── register modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; width: 340px; }
.modal h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
.field { margin-bottom: 0.85rem; }
.field label { display: block; font-size: 0.72rem; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.field input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--sans); font-size: 0.85rem; padding: 7px 11px; outline: none; }
.field input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; margin-top: 1.1rem; }
.alert { padding: 7px 10px; border-radius: 6px; font-size: 0.78rem; margin-bottom: 0.75rem; display: none; }
.alert.show { display: block; }
.alert-err { background: rgba(239,68,68,0.1); border: 1px solid var(--red); color: var(--red); }
.alert-ok  { background: rgba(34,197,94,0.1); border: 1px solid var(--green); color: var(--green); }

/* scrollbar */
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<!-- top bar -->
<div class="topbar">
  <div class="logo">Crypto<em>Mesh</em></div>
  <div class="auth-area" id="auth-login">
    <input type="text"     id="login-user" placeholder="username">
    <input type="password" id="login-pass" placeholder="password">
    <button class="btn btn-blue" onclick="doLogin()">Sign in</button>
    <button class="btn btn-ghost" onclick="openRegModal()">Register</button>
  </div>
  <div class="auth-area" id="auth-logged" style="display:none">
    <span class="user-badge" id="user-badge" style="display:inline-block"></span>
    <button class="btn btn-ghost" onclick="doLogout()">Sign out</button>
  </div>
</div>

<div class="shell">

  <!-- left: contacts -->
  <div class="sidebar">
    <div class="sidebar-header"><h3>Contacts</h3></div>
    <div class="user-list" id="user-list">
      <div style="color:var(--text3);font-size:0.78rem;padding:10px;text-align:center">Sign in to chat</div>
    </div>
    <div class="sidebar-footer">
      <button class="new-user-btn" onclick="openRegModal()">+ New account</button>
    </div>
  </div>

  <!-- centre: chat -->
  <div class="chat-area">
    <div class="chat-header">
      <div>
        <div class="chat-title" id="chat-title">Select a contact</div>
        <div class="chat-subtitle" id="chat-subtitle">X25519 · HKDF-SHA256 · AES-256-GCM · Ed25519</div>
      </div>
      <button class="btn-inspector" onclick="toggleInspector()">
        <span class="dot"></span> Crypto inspector
      </button>
    </div>

    <div class="messages" id="messages">
      <div class="empty-chat">
        <div class="icon">🔐</div>
        <p>Select a contact to start a secure conversation</p>
      </div>
    </div>

    <div class="compose">
      <textarea id="compose-input" placeholder="Write a message…" rows="1" disabled
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="btn-send" id="btn-send" onclick="doSend()" disabled>➤</button>
    </div>
  </div>

  <!-- right: inspector -->
  <div class="inspector" id="inspector">
    <div class="inspector-header">
      <h3>⬡ Crypto inspector</h3>
      <button class="btn-close-inspector" onclick="toggleInspector()">✕</button>
    </div>
    <div class="inspector-body" id="inspector-body">
      <div class="insp-placeholder">Click a message bubble to inspect its cryptographic operations</div>
    </div>
  </div>
</div>

<!-- register modal -->
<div class="modal-overlay" id="reg-modal">
  <div class="modal">
    <h3>Create account</h3>
    <div class="alert alert-err" id="reg-err"></div>
    <div class="alert alert-ok"  id="reg-ok"></div>
    <div class="field"><label>Username</label><input type="text" id="reg-user" placeholder="alice"></div>
    <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="••••••••"></div>
    <div class="modal-actions">
      <button class="btn btn-blue" onclick="doRegister()" style="flex:1">Register</button>
      <button class="btn btn-ghost" onclick="closeRegModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

let me = null;         // logged-in username
let myPass = null;     // password (kept in memory for key unlock)
let activePeer = null; // selected chat partner
let allMessages = [];  // fetched messages for current user
let inspectorOpen = true;

const colors = ['#3b82f6','#22c55e','#a78bfa','#f59e0b','#ef4444','#06b6d4','#f97316'];
function avatarColor(name) { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%colors.length; return colors[h]; }
function initials(name) { return name.slice(0,2).toUpperCase(); }
function timeStr() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

// ── auth ──
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u||!p) return;
  try {
    const r = await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d = await r.json();
    if (!r.ok) return alert(d.error||'Login failed');
    me = u; myPass = p;
    document.getElementById('auth-login').style.display='none';
    document.getElementById('auth-logged').style.display='flex';
    document.getElementById('user-badge').textContent='● '+me;
    loadContacts();
  } catch(e) { alert('Cannot reach backend'); }
}

function doLogout() {
  me=null; myPass=null; activePeer=null;
  document.getElementById('auth-login').style.display='flex';
  document.getElementById('auth-logged').style.display='none';
  document.getElementById('user-list').innerHTML='<div style="color:var(--text3);font-size:0.78rem;padding:10px;text-align:center">Sign in to chat</div>';
  document.getElementById('messages').innerHTML='<div class="empty-chat"><div class="icon">🔐</div><p>Select a contact to start a secure conversation</p></div>';
  document.getElementById('chat-title').textContent='Select a contact';
  document.getElementById('compose-input').disabled=true;
  document.getElementById('btn-send').disabled=true;
}

// ── register ──
function openRegModal() { document.getElementById('reg-modal').classList.add('show'); }
function closeRegModal() { document.getElementById('reg-modal').classList.remove('show'); }

async function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  const err = document.getElementById('reg-err');
  const ok  = document.getElementById('reg-ok');
  err.classList.remove('show'); ok.classList.remove('show');
  if (!u||!p) { err.textContent='Fill in all fields'; err.classList.add('show'); return; }
  try {
    const r = await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d = await r.json();
    if (!r.ok) { err.textContent=d.error; err.classList.add('show'); return; }
    ok.textContent=`Account '${u}' created!`;
    ok.classList.add('show');
    if (me) loadContacts();
    setTimeout(closeRegModal, 1500);
  } catch(e) { err.textContent='Backend unreachable'; err.classList.add('show'); }
}

// ── contacts ──
async function loadContacts() {
  try {
    const r = await fetch(`${API}/users`);
    const d = await r.json();
    const list = document.getElementById('user-list');
    list.innerHTML = '';
    d.users.filter(u=>u!==me).forEach(u => {
      const item = document.createElement('div');
      item.className = 'user-item' + (u===activePeer?' active':'');
      item.innerHTML = `
        <div class="avatar" style="background:${avatarColor(u)}22;color:${avatarColor(u)}">${initials(u)}</div>
        <div><div class="uname">${u}</div><div class="ustatus">🔒 end-to-end encrypted</div></div>`;
      item.onclick = () => openChat(u);
      list.appendChild(item);
    });
  } catch(e) {}
}

// ── open chat ──
async function openChat(peer) {
  activePeer = peer;
  document.getElementById('chat-title').textContent = peer;
  document.getElementById('compose-input').disabled = false;
  document.getElementById('btn-send').disabled = false;
  document.getElementById('compose-input').focus();
  loadContacts(); // refresh active state
  await fetchMessages();
}

// ── fetch & render messages ──
async function fetchMessages() {
  if (!me||!myPass) return;
  try {
    const r = await fetch(`${API}/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:me,password:myPass})});
    const d = await r.json();
    if (!r.ok) return;
    allMessages = d.messages||[];
    renderMessages();
  } catch(e) {}
}

function renderMessages() {
  const box = document.getElementById('messages');
  const convo = allMessages.filter(m => m.sender===activePeer||m.recipient===activePeer);

  // also include sent messages (we only get received ones from API, so we track locally)
  const all = [...convo, ...sentMessages.filter(m=>m.recipient===activePeer||m.sender===activePeer)]
    .sort((a,b)=>(a._ts||0)-(b._ts||0));

  if (all.length===0) {
    box.innerHTML='<div class="empty-chat"><div class="icon">💬</div><p>No messages yet — say something!</p></div>';
    return;
  }
  box.innerHTML='';
  all.forEach((msg,i) => {
    const sent = msg.sender === me;
    const row = document.createElement('div');
    row.className = 'msg-row ' + (sent?'sent':'received');
    const color = avatarColor(msg.sender);
    const sigBadge = msg.sig_valid===true ? `<span class="sig-ok">✓ signed</span>`
                   : msg.sig_valid===false? `<span class="sig-bad">✗ bad sig</span>`
                   : '';
    row.innerHTML = `
      <div class="bubble-avatar" style="background:${color}22;color:${color}">${initials(msg.sender)}</div>
      <div class="bubble-wrap">
        <div class="bubble" onclick="inspectMessage(${i},'${sent?'sent':'recv'}')" title="Click to inspect crypto">${msg.plaintext||'<em style=color:var(--text3)>encrypted</em>'}</div>
        <div class="bubble-meta">
          <span class="bubble-time">${msg._time||'--:--'}</span>
          ${sigBadge}
          <span class="crypto-hint">AES-256-GCM</span>
        </div>
      </div>`;
    row.dataset.idx = i;
    box.appendChild(row);
  });
  box.scrollTop = box.scrollHeight;
  window._allRendered = all;
}

// ── send ──
let sentMessages = [];

async function doSend() {
  if (!me||!activePeer) return;
  const ta = document.getElementById('compose-input');
  const msg = ta.value.trim();
  if (!msg) return;
  ta.value=''; ta.style.height='auto';
  try {
    const r = await fetch(`${API}/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:me,password:myPass,recipient:activePeer,message:msg})});
    const d = await r.json();
    if (!r.ok) return alert(d.error||'Send failed');
    const sentMsg = {sender:me,recipient:activePeer,plaintext:msg,sig_valid:true,steps:d.steps,_time:timeStr(),_ts:Date.now(),_isSent:true};
    sentMessages.push(sentMsg);
    await fetchMessages();
    // show inspector for the sent message
    showInspector(d.steps, msg, 'sent');
  } catch(e) { alert('Backend unreachable'); }
}

// ── inspector ──
function toggleInspector() {
  inspectorOpen = !inspectorOpen;
  document.getElementById('inspector').classList.toggle('hidden', !inspectorOpen);
}

function inspectMessage(idx, dir) {
  const all = window._allRendered||[];
  const msg = all[idx];
  if (!msg) return;
  if (!inspectorOpen) { inspectorOpen=true; document.getElementById('inspector').classList.remove('hidden'); }
  showInspector(msg.steps, msg.plaintext, dir, msg);
}

const stepClasses = {
  'ECDH':'dh','Key Exchange':'dh','X25519':'dh',
  'HKDF':'kdf','Key Deriv':'kdf',
  'AES':'enc','Encrypt':'enc','Decrypt':'enc','GCM':'enc',
  'Ed25519':'sig','Sign':'sig','Signature':'sig','Verify':'sig',
  'Authenticate':'auth','bcrypt':'auth','scrypt':'auth','KEK':'auth','password':'auth','Password':'auth',
  'Saved':'save','disk':'save'
};
function stepClass(name) {
  for (const [k,v] of Object.entries(stepClasses)) if (name.includes(k)) return v;
  return '';
}

function showInspector(steps, plaintext, dir, msg) {
  const body = document.getElementById('inspector-body');
  const dirLabel = dir==='sent'?'↑ outgoing':'↓ incoming';
  const dirColor = dir==='sent'?'var(--accent)':'var(--green)';

  let html = `
    <div class="insp-section">
      <div class="insp-label">Message</div>
      <div class="algo-badge" style="border-color:${dirColor};color:var(--text)">${dirLabel} — "${plaintext||'(encrypted)'}"</div>
    </div>
    <div class="insp-section">
      <div class="insp-label">Protocol</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
        <span class="tag tag-dh">X25519 ECDH</span>
        <span class="tag tag-kdf">HKDF-SHA256</span>
        <span class="tag tag-enc">AES-256-GCM</span>
        <span class="tag tag-sig">Ed25519</span>
      </div>
    </div>
    <div class="insp-section">
      <div class="insp-label">Operations (${(steps||[]).length} steps)</div>
  `;

  (steps||[]).forEach((s,i) => {
    const cls = stepClass(s.step);
    html += `<div class="step-item ${cls}" style="animation-delay:${i*60}ms">
      <div class="step-name">${s.step}</div>
      <div class="step-detail">${s.detail}</div>
    </div>`;
  });

  if (!steps||steps.length===0) {
    html += '<div style="color:var(--text3);font-size:0.78rem">No step data available for this message.</div>';
  }

  html += '</div>';

  if (msg && msg.sig_valid !== undefined) {
    html += `<div class="insp-section">
      <div class="insp-label">Integrity</div>
      <div class="algo-badge" style="border-color:${msg.sig_valid?'var(--green)':'var(--red)'}">
        Ed25519 signature: ${msg.sig_valid ? '✓ VALID — sender authenticated' : '✗ INVALID — possible forgery'}
      </div>
    </div>`;
  }

  body.innerHTML = html;
}
</script>
</body>
</html>
